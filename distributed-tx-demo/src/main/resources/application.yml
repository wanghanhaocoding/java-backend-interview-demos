spring:
  datasource:
    url: jdbc:h2:mem:distributed_tx_demo;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always

logging:
  level:
    org.springframework.jdbc.core.JdbcTemplate: debug
    org.springframework.transaction.interceptor: trace

teaching:
  runner:
    enabled: true
